<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Tesla Lyrics Remote</title>
  <script src="https://unpkg.com/twemoji@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #F4F1EA;
      --text-primary: #1a1a1a;
      --text-secondary: #555550;
      --text-muted: #8a8880;
      --accent: #2d2d2a;
      --btn-bg: rgba(26, 26, 26, 0.08);
      --btn-hover: rgba(26, 26, 26, 0.16);
      --btn-active-bg: #1a1a1a;
      --btn-active-text: #F4F1EA;
      --divider: rgba(26, 26, 26, 0.1);
      --skip-color: #c82020;
      --skip-bg: rgba(200, 32, 32, 0.12);
      --skip-border: rgba(200, 32, 32, 0.4);
      --keep-color: #1a8a3a;
      --keep-bg: rgba(26, 138, 58, 0.12);
      --keep-border: rgba(26, 138, 58, 0.4);
    }

    body.dark {
      --bg: #121212;
      --text-primary: #e8e6e0;
      --text-secondary: #a0a09a;
      --text-muted: #666660;
      --accent: #e8e6e0;
      --btn-bg: rgba(232, 230, 224, 0.08);
      --btn-hover: rgba(232, 230, 224, 0.16);
      --btn-active-bg: #e8e6e0;
      --btn-active-text: #121212;
      --divider: rgba(232, 230, 224, 0.1);
      --skip-color: #ff6060;
      --skip-bg: rgba(255, 80, 80, 0.12);
      --skip-border: rgba(255, 80, 80, 0.4);
      --keep-color: #50c870;
      --keep-bg: rgba(60, 200, 100, 0.12);
      --keep-border: rgba(60, 200, 100, 0.4);
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 16px 16px 24px;
      gap: 10px;
      transition: opacity 0.2s ease, filter 0.2s ease;
    }

    body.pin-locked #app {
      opacity: 0.42;
      filter: saturate(0.75);
      pointer-events: none;
    }

    #track-info {
      flex-shrink: 0;
      text-align: center;
      padding: 4px 0;
    }

    #track-title {
      font-size: clamp(14px, 4vw, 18px);
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #track-artist {
      font-size: clamp(12px, 3vw, 14px);
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    #vote-section {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
    }

    #vote-disabled-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: clamp(16px, 4vw, 22px);
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      z-index: 2;
      pointer-events: none;
    }

    body.voting-disabled #vote-disabled-overlay {
      display: flex;
    }

    body.voting-disabled #vote-section .vote-btn {
      opacity: 0.25;
      pointer-events: none;
    }

    .vote-btn {
      flex: 1;
      border: 2px solid var(--divider);
      border-radius: 24px;
      background: var(--btn-bg);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      overflow: hidden;
      transition: background 0.15s, transform 0.1s, border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }

    .vote-btn:active {
      transform: scale(0.97);
    }

    .vote-btn__icon {
      font-size: clamp(44px, 11vw, 72px);
      line-height: 1;
    }

    .vote-btn__label {
      font-size: clamp(20px, 6vw, 32px);
      font-weight: 700;
      letter-spacing: 0.1em;
    }

    .vote-btn.skip-active {
      background: var(--skip-bg);
      border-color: var(--skip-border);
      color: var(--skip-color);
    }

    .vote-btn.keep-active {
      background: var(--keep-bg);
      border-color: var(--keep-border);
      color: var(--keep-color);
    }

    #voter-list {
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      padding: 2px 0;
      min-height: 30px;
    }

     .voter-chip {
       font-size: 22px;
       padding: 4px 8px;
       border-radius: 20px;
       background: var(--btn-bg);
       white-space: nowrap;
       border: 2px solid transparent;
       line-height: 1.3;
     }

     .voter-chip img.emoji {
       height: 1.2em;
       width: 1.2em;
       vertical-align: -0.2em;
     }
 
     .voter-chip.is-me {
       border-color: var(--divider);
     }
 
     .voter-chip.vote-skip {
       background: var(--skip-bg);
       border-color: var(--skip-border);
     }
 
     .voter-chip.vote-keep {
       background: var(--keep-bg);
       border-color: var(--keep-border);
     }

    #nav-row {
      flex-shrink: 0;
      display: flex;
      gap: 10px;
      height: 60px;
    }

    .nav-btn {
      flex: 1;
      border: 1px solid var(--divider);
      border-radius: 16px;
      background: var(--btn-bg);
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }

    .nav-btn:active {
      transform: scale(0.96);
      background: var(--btn-hover);
    }

    .nav-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    #footer-label {
      flex-shrink: 0;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding-bottom: max(4px, env(safe-area-inset-bottom));
    }

     #emoji-overlay {
       position: fixed;
       inset: 0;
       z-index: 200;
       background: var(--bg);
       display: flex;
       flex-direction: column;
       align-items: center;
       justify-content: center;
       gap: 24px;
       padding: 32px;
     }
 
     #emoji-overlay.hidden {
       display: none;
     }
 
     #emoji-overlay h2 {
       font-size: clamp(22px, 6vw, 30px);
       font-weight: 700;
       color: var(--text-primary);
       text-align: center;
     }
 
     #emoji-overlay p {
       font-size: 14px;
       color: var(--text-muted);
       text-align: center;
     }
 
     #emoji-grid {
       display: grid;
       grid-template-columns: repeat(5, 1fr);
       gap: 12px;
       width: min(340px, 90vw);
     }
 
     .emoji-choice {
       aspect-ratio: 1;
       border: 2px solid var(--divider);
       border-radius: 16px;
       background: var(--btn-bg);
       display: flex;
       align-items: center;
       justify-content: center;
       font-size: 32px;
       cursor: pointer;
       -webkit-tap-highlight-color: transparent;
       touch-action: manipulation;
       transition: background 0.12s, border-color 0.12s, transform 0.08s;
     }
 
     .emoji-choice img.emoji {
       height: 1em;
       width: 1em;
       pointer-events: none;
     }
 
     .emoji-choice:active {
       transform: scale(0.9);
       background: var(--btn-hover);
     }
 
     .emoji-choice.selected {
       border-color: var(--accent);
       background: var(--btn-hover);
     }

    #pin-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 24px;
    }

    #pin-overlay.hidden {
      display: none;
    }

    #pin-display {
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      letter-spacing: 16px;
      color: var(--text-primary);
      text-align: center;
      padding-left: 16px;
    }

    #pin-display.shake {
      animation: pinShake 0.4s ease;
    }

    #pin-pad {
      width: min(380px, 90vw);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .pin-btn {
      width: 100%;
      aspect-ratio: 1;
      border: none;
      border-radius: 16px;
      background: var(--btn-bg);
      color: var(--text-primary);
      font-size: clamp(22px, 6vw, 32px);
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: background 0.1s, transform 0.08s;
    }

    .pin-btn:active {
      background: var(--btn-hover);
      transform: scale(0.93);
    }

    #pin-error {
      font-size: 15px;
      color: #e04040;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.15s;
    }

    #pin-error.visible {
      opacity: 1;
    }

    @keyframes pinShake {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-10px); }
      30% { transform: translateX(10px); }
      45% { transform: translateX(-8px); }
      60% { transform: translateX(8px); }
      75% { transform: translateX(-4px); }
      90% { transform: translateX(4px); }
    }

    @media (orientation: landscape) {
      #vote-section {
        flex-direction: row;
      }
    }
  </style>
</head>
<body>
  <main id="app">
    <div id="track-info">
      <div id="track-title">—</div>
      <div id="track-artist"></div>
    </div>

    <div id="vote-section">
      <div id="vote-disabled-overlay">Voting not enabled</div>
      <button class="vote-btn" id="btn-skip" type="button">
        <span class="vote-btn__icon">✕</span>
        <span class="vote-btn__label">SKIP</span>
      </button>
      <button class="vote-btn" id="btn-keep" type="button">
        <span class="vote-btn__icon">♥</span>
        <span class="vote-btn__label">KEEP</span>
      </button>
    </div>

    <div id="voter-list"></div>

    <div id="nav-row">
      <button class="nav-btn" id="btn-prev" type="button" data-direction="prev">◀ PREV</button>
      <button class="nav-btn" id="btn-next" type="button" data-direction="next">NEXT ▶</button>
    </div>

    <div id="footer-label">Tesla Lyrics Remote</div>
  </main>

  <div id="emoji-overlay" class="hidden">
    <h2>Who are you?</h2>
    <p>Pick your emoji to join the vote</p>
    <div id="emoji-grid"></div>
  </div>

  <div id="pin-overlay" class="hidden">
    <div id="pin-display"><span id="pin-dots"></span></div>
    <div id="pin-pad">
      <button class="pin-btn" type="button" data-pin-digit="1">1</button>
      <button class="pin-btn" type="button" data-pin-digit="2">2</button>
      <button class="pin-btn" type="button" data-pin-digit="3">3</button>
      <button class="pin-btn" type="button" data-pin-digit="4">4</button>
      <button class="pin-btn" type="button" data-pin-digit="5">5</button>
      <button class="pin-btn" type="button" data-pin-digit="6">6</button>
      <button class="pin-btn" type="button" data-pin-digit="7">7</button>
      <button class="pin-btn" type="button" data-pin-digit="8">8</button>
      <button class="pin-btn" type="button" data-pin-digit="9">9</button>
      <button class="pin-btn" type="button" id="pin-backspace" aria-label="Backspace">←</button>
      <button class="pin-btn" type="button" data-pin-digit="0">0</button>
      <button class="pin-btn" type="button" id="pin-submit" aria-label="Submit PIN">✓</button>
    </div>
    <div id="pin-error">Incorrect PIN</div>
  </div>

  <script>
    function applyDarkMode(dark) {
      document.body.classList.toggle('dark', dark);
    }

    const storedDarkMode = localStorage.getItem('darkMode');
    if (storedDarkMode === '1') {
      applyDarkMode(true);
    } else if (storedDarkMode === '0') {
      applyDarkMode(false);
    } else {
      applyDarkMode(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
    }

    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const btnSkip = document.getElementById('btn-skip');
    const btnKeep = document.getElementById('btn-keep');
    const trackTitle = document.getElementById('track-title');
     const trackArtist = document.getElementById('track-artist');
     const voterListEl = document.getElementById('voter-list');
     const emojiOverlay = document.getElementById('emoji-overlay');
     const emojiGrid = document.getElementById('emoji-grid');
     const pinOverlay = document.getElementById('pin-overlay');
     const pinDisplay = document.getElementById('pin-display');
     const pinDots = document.getElementById('pin-dots');
     const pinError = document.getElementById('pin-error');
     const pinBackspace = document.getElementById('pin-backspace');
     const pinSubmit = document.getElementById('pin-submit');
     const pinDigitButtons = Array.from(document.querySelectorAll('[data-pin-digit]'));

     const EMOJI_LIST = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐙','🦄','🐲','🌈','⭐','🍕'];

     let myVoterId = localStorage.getItem('voterSessionId');
     let myVoterName = localStorage.getItem('voterName');
    let myVote = null;
    let sseConn = null;
    let heartbeatTimer = null;
    let voteRequestPending = false;
    let pageRequestPending = false;
    let pinEntry = '';
    let pinErrorTimer = null;
    let pinResetTimer = null;
    let pinSubmitting = false;

    function generateId() {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) {
        return crypto.randomUUID();
      }
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
    }

    function updatePinDots() {
      pinDots.textContent = '●'.repeat(pinEntry.length);
    }

    function clearPinError() {
      pinError.classList.remove('visible');
      pinDisplay.classList.remove('shake');
      clearTimeout(pinErrorTimer);
      pinErrorTimer = null;
    }

     function setPinLocked(locked) {
       document.body.classList.toggle('pin-locked', locked);
       pinOverlay.classList.toggle('hidden', !locked);
       if (locked) {
         emojiOverlay.classList.add('hidden');
       }
       updateNavButtons();
     }

    function clearPinEntry() {
      pinEntry = '';
      updatePinDots();
    }

    function showPinErrorState() {
      pinError.classList.add('visible');
      pinDisplay.classList.remove('shake');
      void pinDisplay.offsetWidth;
      pinDisplay.classList.add('shake');
      clearTimeout(pinErrorTimer);
      pinErrorTimer = setTimeout(() => clearPinError(), 600);
    }

    async function submitPin() {
      if (!pinEntry || pinSubmitting) return;
      pinSubmitting = true;
      clearPinError();
      clearTimeout(pinResetTimer);
      try {
        const res = await fetch('/pin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin: pinEntry }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.ok) {
          clearPinEntry();
          setPinLocked(false);
          await initVoter();
          startHeartbeat();
          return;
        }
        showPinErrorState();
        pinResetTimer = setTimeout(() => {
          clearPinEntry();
          clearPinError();
        }, 600);
      } catch (_err) {
        showPinErrorState();
      } finally {
        pinSubmitting = false;
      }
    }

    function appendPinDigit(digit) {
      if (pinSubmitting || pinEntry.length >= 6) return;
      pinEntry += digit;
      updatePinDots();
      clearPinError();
      if (pinEntry.length === 6) {
        submitPin();
      }
    }

    pinDigitButtons.forEach((button) => {
      button.addEventListener('click', () => appendPinDigit(button.dataset.pinDigit));
    });

    pinBackspace.addEventListener('click', () => {
      if (pinSubmitting || !pinEntry.length) return;
      pinEntry = pinEntry.slice(0, -1);
      updatePinDots();
      clearPinError();
    });

    pinSubmit.addEventListener('click', () => submitPin());

    function updateNavButtons() {
      const locked = document.body.classList.contains('pin-locked');
      const disabled = locked || pageRequestPending;
      btnPrev.disabled = disabled;
      btnNext.disabled = disabled;
    }

    async function sendDirection(direction, button) {
      if (pageRequestPending || document.body.classList.contains('pin-locked')) return;
      pageRequestPending = true;
      updateNavButtons();
      button.style.opacity = '0.6';
      setTimeout(() => { button.style.opacity = ''; }, 180);
      try {
        const res = await fetch('/api/page', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ direction }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.status === 401 && data.pinRequired) {
          setPinLocked(true);
        }
      } catch (_) {}
      finally {
        pageRequestPending = false;
        updateNavButtons();
      }
    }

    btnPrev.addEventListener('click', () => sendDirection('prev', btnPrev));
    btnNext.addEventListener('click', () => sendDirection('next', btnNext));

    function updateVoteButtons(pendingVote) {
      const v = pendingVote !== undefined ? pendingVote : myVote;
      btnSkip.classList.toggle('skip-active', v === 'skip');
      btnKeep.classList.toggle('keep-active', v === 'keep');
    }

    function setVotingEnabled(enabled) {
      document.body.classList.toggle('voting-disabled', !enabled);
    }

     function renderVoterList(voterArray) {
       voterListEl.innerHTML = '';
       for (const voter of voterArray) {
         const chip = document.createElement('div');
         chip.className = 'voter-chip';
         if (voter.name === myVoterName) chip.classList.add('is-me');
         if (voter.vote === 'skip') chip.classList.add('vote-skip');
         if (voter.vote === 'keep') chip.classList.add('vote-keep');
         chip.textContent = voter.name;
         twemoji.parse(chip, { folder: 'svg', ext: '.svg' });
         voterListEl.appendChild(chip);
       }
    }

    async function sendVote(vote) {
      if (voteRequestPending || !myVoterId) return;
      const newVote = myVote === vote ? null : vote;
      voteRequestPending = true;
      updateVoteButtons(newVote);
      try {
        const res = await fetch('/api/vote', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: myVoterId, vote: newVote }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.status === 401 && data.pinRequired) {
          setPinLocked(true);
          updateVoteButtons(myVote);
          return;
        }
        if (res.ok) {
          myVote = newVote;
        } else {
          updateVoteButtons(myVote);
        }
      } catch (_) {
        updateVoteButtons(myVote);
      } finally {
        voteRequestPending = false;
      }
    }

    btnSkip.addEventListener('click', () => sendVote('skip'));
    btnKeep.addEventListener('click', () => sendVote('keep'));

    function connectVoterSSE() {
      if (sseConn) sseConn.close();
      sseConn = new EventSource('/events');

      sseConn.onmessage = (e) => {
        try {
          const payload = JSON.parse(e.data);
          if (payload.type === 'state') {
            setVotingEnabled(payload.isVoting);
            return;
          }
          if (payload.type === 'vote') {
            setVotingEnabled(payload.isVoting);
            const myRecord = payload.voters.find((v) => v.name === myVoterName);
            if (myRecord) {
              myVote = myRecord.vote;
              updateVoteButtons();
            }
            renderVoterList(payload.voters);
            return;
          }
          if (payload.type === 'loading') {
            trackTitle.textContent = payload.title || '—';
            trackArtist.textContent = payload.artist || '';
            myVote = null;
            updateVoteButtons();
            return;
          }
          if (payload.status === 'playing' && payload.title) {
            trackTitle.textContent = payload.title;
            trackArtist.textContent = payload.artist || '';
          }
        } catch (_) {}
      };

      sseConn.onerror = () => {
        sseConn.close();
        sseConn = null;
        setTimeout(connectVoterSSE, 3000);
      };
    }

    function startHeartbeat() {
      clearInterval(heartbeatTimer);
      heartbeatTimer = setInterval(async () => {
        if (!myVoterId) return;
        try {
          const res = await fetch('/api/voter/heartbeat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: myVoterId }),
          });
          const data = await res.json().catch(() => ({}));
          if (res.status === 401 && data.pinRequired) {
            setPinLocked(true);
            clearInterval(heartbeatTimer);
          } else if (res.status === 404 && myVoterName) {
            await registerVoter(myVoterId, myVoterName);
          }
        } catch (_) {}
      }, 20000);
    }

    async function registerVoter(id, name) {
      try {
        const res = await fetch('/api/voter/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, name }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.status === 401 && data.pinRequired) {
          setPinLocked(true);
          return null;
        }
        if (!res.ok) return null;
        return data.name;
      } catch (_) {
        return null;
      }
    }

     function buildEmojiGrid() {
       EMOJI_LIST.forEach((emoji) => {
         const btn = document.createElement('button');
         btn.className = 'emoji-choice';
         btn.type = 'button';
         btn.textContent = emoji;
         twemoji.parse(btn, { folder: 'svg', ext: '.svg' });
         btn.addEventListener('click', () => selectEmoji(emoji));
         emojiGrid.appendChild(btn);
       });
     }

     async function selectEmoji(emoji) {
       if (!myVoterId) {
         myVoterId = generateId();
         localStorage.setItem('voterSessionId', myVoterId);
       }
       const registeredName = await registerVoter(myVoterId, emoji);
       if (!registeredName) return;
       myVoterName = registeredName;
       localStorage.setItem('voterName', myVoterName);
       myVote = null;
       emojiOverlay.classList.add('hidden');
       updateVoteButtons();
       connectVoterSSE();
     }

     async function initVoter() {
       if (!myVoterId) {
         buildEmojiGrid();
         emojiOverlay.classList.remove('hidden');
         return;
       }
       try {
         const res = await fetch(`/api/voter/me?id=${encodeURIComponent(myVoterId)}`);
         const data = await res.json().catch(() => ({}));
         if (res.status === 401 && data.pinRequired) {
           setPinLocked(true);
           return;
         }
         if (res.ok && data.registered) {
           myVoterName = data.name;
           localStorage.setItem('voterName', myVoterName);
           connectVoterSSE();
           return;
         }
       } catch (_) {}
       buildEmojiGrid();
       emojiOverlay.classList.remove('hidden');
     }

    async function checkAuth() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json().catch(() => ({}));
        if (res.status === 401 && data.pinRequired) {
          setPinLocked(true);
          return false;
        }
        setPinLocked(false);
        setVotingEnabled(!!data.isVoting);
        return true;
      } catch (_) {
        setPinLocked(false);
        return true;
      }
    }

    updatePinDots();
    updateNavButtons();
    checkAuth().then((authed) => {
      if (authed) {
        initVoter();
        startHeartbeat();
      }
    });
  </script>
</body>
</html>
