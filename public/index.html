<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tesla Lyrics</title>
  <script src="https://unpkg.com/twemoji@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #F4F1EA;
      --text-primary: #1a1a1a;
      --text-secondary: #555550;
      --text-muted: #8a8880;
      --accent: #2d2d2a;
      --btn-bg: rgba(26, 26, 26, 0.08);
      --btn-hover: rgba(26, 26, 26, 0.16);
      --btn-active-bg: #1a1a1a;
      --btn-active-text: #F4F1EA;
      --indicator-on: #3a8a4a;
      --indicator-off: #8a8880;
      --divider: rgba(26, 26, 26, 0.1);
    }

    body.dark {
      --bg: #121212;
      --text-primary: #e8e6e0;
      --text-secondary: #a0a09a;
      --text-muted: #666660;
      --accent: #e8e6e0;
      --btn-bg: rgba(232, 230, 224, 0.08);
      --btn-hover: rgba(232, 230, 224, 0.16);
      --btn-active-bg: #e8e6e0;
      --btn-active-text: #121212;
      --indicator-on: #4caf60;
      --indicator-off: #666660;
      --divider: rgba(232, 230, 224, 0.1);
    }

    html, body {
      height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body.pin-locked {
      overflow: hidden;
    }

    body.pin-locked #app,
    body.pin-locked #controls,
    body.pin-locked #login-banner,
    body.pin-locked #timeout-toast,
    body.pin-locked #lyrics-source,
    body.pin-locked #page-indicator,
    body.pin-locked #vote-tally,
    body.pin-locked #vote-toast-stack,
    body.pin-locked #tap-flash,
    body.pin-locked #btn-debug,
    body.pin-locked #debug-overlay,
    body.pin-locked #loader-overlay {
      visibility: hidden;
      pointer-events: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      padding: 46px 28px 40px;
    }

    #controls {
      position: fixed;
      top: 16px;
      right: 20px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      z-index: 160;
    }

    .ctrl-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .ctrl-btn {
      width: 65px;
      height: 65px;
      border: none;
      border-radius: 50%;
      background: var(--btn-bg);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      flex-shrink: 0;
    }

    .ctrl-btn:hover {
      background: var(--btn-hover);
    }

    .ctrl-btn:active {
      transform: scale(0.93);
    }

    .ctrl-btn.active {
      background: var(--btn-active-bg);
      color: var(--btn-active-text);
    }

    .ctrl-btn__icon {
      font-size: 32px;
      line-height: 1;
    }

    .ctrl-btn__label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1;
      color: var(--text-muted);
    }

    #lyrics-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    #lyrics-text {
      line-height: 1.65;
      color: var(--text-primary);
      text-align: center;
      width: 100%;
      height: 100%;
      white-space: pre-wrap;
      word-break: break-word;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #lyrics-inner {
      font-size: 30px;
      column-gap: 2em;
    }

    #lyrics-text.muted {
      color: var(--text-muted);
      font-style: italic;
    }

    #login-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a1a;
      color: #F4F1EA;
      padding: 14px 28px;
      text-align: center;
      font-size: 14px;
      display: none;
    }

    #login-banner a {
      color: #a8d8b0;
      font-weight: 700;
      text-decoration: none;
    }

    #login-banner.visible {
      display: block;
    }

    #pin-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 24px;
    }

    #pin-overlay.hidden {
      display: none;
    }

    #pin-display {
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      letter-spacing: 16px;
      color: var(--text-primary);
      text-align: center;
      padding-left: 16px;
    }

    #pin-display.shake {
      animation: pinShake 0.4s ease;
    }

    #pin-pad {
      width: min(380px, 90vw);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .pin-btn {
      width: 100%;
      aspect-ratio: 1;
      border: none;
      border-radius: 16px;
      background: var(--btn-bg);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 32px;
      font-weight: 600;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .pin-btn:hover {
      background: var(--btn-hover);
    }

    .pin-btn:active {
      transform: scale(0.96);
    }

    #pin-error {
      min-height: 20px;
      color: #e05555;
      font-size: 16px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    #pin-error.visible {
      opacity: 1;
    }

    @keyframes pinShake {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-10px); }
      30% { transform: translateX(10px); }
      45% { transform: translateX(-8px); }
      60% { transform: translateX(8px); }
      75% { transform: translateX(-4px); }
      90% { transform: translateX(4px); }
    }

    #timeout-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-60px);
      background: #1a1a1a;
      color: #F4F1EA;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      transition: transform 0.3s ease;
      z-index: 100;
      white-space: nowrap;
    }

    #timeout-toast.visible {
      transform: translateX(-50%) translateY(0);
    }

    #btn-dark {
      position: fixed;
      bottom: 20px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--btn-bg);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      z-index: 50;
    }

    #btn-dark:hover {
      background: var(--btn-hover);
    }

    #btn-dark:active {
      transform: scale(0.92);
    }

    #icon-sun, #icon-moon {
      position: absolute;
      transition: opacity 0.2s, transform 0.3s;
    }

    body:not(.dark) #icon-sun  { opacity: 1; transform: rotate(0deg) scale(1); }
    body:not(.dark) #icon-moon { opacity: 0; transform: rotate(90deg) scale(0.6); }
    body.dark #icon-sun        { opacity: 0; transform: rotate(-90deg) scale(0.6); }
    body.dark #icon-moon       { opacity: 1; transform: rotate(0deg) scale(1); }

    #lyrics-source {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      color: #b8b5ae;
      letter-spacing: 0.04em;
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 0.3s;
      opacity: 0;
      max-width: calc(100vw - 160px);
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
      z-index: 10;
    }

    #lyrics-source.visible {
      opacity: 1;
    }

    body.dark #lyrics-source {
      color: #555550;
    }

    #page-indicator {
      position: fixed;
      bottom: 20px;
      right: 76px;
      font-size: 38px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
      pointer-events: none;
      transition: opacity 0.3s;
      opacity: 0;
      z-index: 10;
    }

    #page-indicator.visible {
      opacity: 1;
    }

    body.dark #page-indicator {
      color: var(--text-secondary);
    }

    #tap-flash {
      position: fixed;
      top: 0;
      width: 50%;
      height: 100%;
      pointer-events: none;
      opacity: 0;
      z-index: 5;
      transition: opacity 0.05s ease-in;
    }

    #tap-flash.left  { left: 0;   background: rgba(26,26,26,0.18); }
    #tap-flash.right { right: 0;  background: rgba(26,26,26,0.18); }
    body.dark #tap-flash.left  { background: rgba(232,230,224,0.15); }
    body.dark #tap-flash.right { background: rgba(232,230,224,0.15); }

    #tap-flash.flash {
      opacity: 1;
    }

    /* ── Debug overlay ── */
    #btn-debug {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 44px;
      height: 44px;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 200;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #debug-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      color: #c8ffc8;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.5;
      z-index: 300;
      flex-direction: column;
    }

    #debug-overlay.visible {
      display: flex;
    }

    #loader-overlay {
      position: fixed;
      inset: 0;
      z-index: 150;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: var(--bg);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    #loader-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #loader-song {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }

    #loader-title {
      font-size: clamp(18px, 4vw, 32px);
      font-weight: 700;
      color: var(--text-primary);
      text-align: center;
      max-width: 80vw;
    }

    #loader-artist {
      font-size: clamp(14px, 2.5vw, 22px);
      color: var(--text-secondary);
      text-align: center;
      max-width: 80vw;
    }

    #loader-bar-track {
      width: 60vw;
      max-width: 480px;
      height: 6px;
      border-radius: 3px;
      background: var(--divider);
      overflow: hidden;
    }

    #loader-bar-fill {
      height: 100%;
      width: 0%;
      background: var(--text-primary);
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    #loader-stage {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #debug-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px 10px;
      border-bottom: 1px solid rgba(200, 255, 200, 0.15);
      flex-shrink: 0;
    }

    #debug-header span {
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.05em;
      color: #7fff7f;
    }

    #btn-debug-close {
      background: rgba(200, 255, 200, 0.12);
      border: none;
      color: #c8ffc8;
      font-size: 18px;
      line-height: 1;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #btn-debug-clear {
      background: rgba(200, 255, 200, 0.08);
      border: none;
      color: #c8ffc8;
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      margin-right: 8px;
    }

    #debug-log {
      flex: 1;
      overflow-y: auto;
      padding: 10px 18px 16px;
    }

    .dbg-line {
      padding: 3px 0;
      border-bottom: 1px solid rgba(200, 255, 200, 0.06);
      word-break: break-all;
      white-space: pre-wrap;
    }

    .dbg-line.err  { color: #ff8080; }
    .dbg-line.warn { color: #ffd080; }
    .dbg-line.info { color: #80d0ff; }
    .dbg-line.ok   { color: #c8ffc8; }

    #vote-tally {
      position: fixed;
      bottom: 24px;
      left: 28px;
      display: none;
      align-items: center;
      gap: 0;
      z-index: 20;
      pointer-events: none;
      background: var(--btn-bg);
      border-radius: 24px;
      overflow: hidden;
    }

    #vote-tally.visible {
      display: flex;
    }

    #vote-keep-side, #vote-skip-side {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 6px 10px;
      min-width: 32px;
    }

    #vote-keep-side {
      background: rgba(26, 138, 58, 0.12);
    }

    body.dark #vote-keep-side {
      background: rgba(60, 200, 100, 0.12);
    }

    #vote-skip-side {
      background: rgba(200, 32, 32, 0.10);
    }

    body.dark #vote-skip-side {
      background: rgba(255, 80, 80, 0.10);
    }

    #vote-divider {
      width: 1px;
      height: 28px;
      background: var(--divider);
      flex-shrink: 0;
    }

    .tally-emoji {
      font-size: 20px;
      line-height: 1;
    }

    .tally-emoji img.emoji {
      height: 1em;
      width: 1em;
      vertical-align: -0.1em;
    }

    #vote-tally.skipping {
      opacity: 0.6;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #vote-spinner {
      width: 13px;
      height: 13px;
      border: 2px solid var(--divider);
      border-top-color: var(--text-secondary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
      display: none;
      margin: 6px 10px;
    }

    #vote-tally.skipping #vote-spinner {
      display: block;
    }

    #vote-toast-stack {
      position: fixed;
      bottom: 58px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      z-index: 160;
      pointer-events: none;
    }

    .vote-toast-item {
      background: var(--btn-active-bg);
      color: var(--btn-active-text);
      font-size: 32px;
      font-weight: 600;
      padding: 17px 44px;
      border-radius: 40px;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .vote-toast-item.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div id="controls">
    <div class="ctrl-wrap">
      <button class="ctrl-btn" id="btn-lyrics" aria-label="Toggle lyrics">
        <span class="ctrl-btn__icon">♪</span>
      </button>
      <span class="ctrl-btn__label">Lyrics</span>
    </div>
    <div class="ctrl-wrap">
      <button class="ctrl-btn" id="btn-vote" aria-label="Toggle voting">
        <span class="ctrl-btn__icon">✌</span>
      </button>
      <span class="ctrl-btn__label">Vote</span>
    </div>
  </div>

  <div id="app">
    <div id="lyrics-container">
      <div id="lyrics-text" class="muted"><div id="lyrics-inner">Tap Start to load lyrics.</div></div>
    </div>
  </div>

  <div id="login-banner">
    Not authenticated with Spotify. <a href="/login">Tap here to log in →</a>
  </div>

  <div id="timeout-toast">⏱ Polling stopped after 1 hour.</div>
  <div id="lyrics-source"></div>
  <div id="page-indicator"></div>
  <div id="vote-tally">
    <div id="vote-keep-side"></div>
    <div id="vote-divider"></div>
    <div id="vote-spinner"></div>
    <div id="vote-skip-side"></div>
  </div>
  <div id="vote-toast-stack"></div>
  <div id="tap-flash"></div>

  <button id="btn-dark" aria-label="Toggle dark mode">
    <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <button id="btn-debug" aria-label="Open debug log"></button>

  <div id="debug-overlay">
    <div id="debug-header">
      <span>🛠 Debug Log</span>
      <div style="display:flex;align-items:center">
        <button id="btn-debug-clear">Clear</button>
        <button id="btn-debug-close">✕</button>
      </div>
    </div>
    <div id="debug-log"></div>
  </div>

  <div id="loader-overlay">
    <div id="loader-song">
      <div id="loader-title"></div>
      <div id="loader-artist"></div>
    </div>
    <div id="loader-bar-track">
      <div id="loader-bar-fill"></div>
    </div>
    <div id="loader-stage"></div>
  </div>

  <div id="pin-overlay" class="hidden">
    <div id="pin-display"><span id="pin-dots"></span></div>
    <div id="pin-pad">
      <button class="pin-btn" type="button" data-pin-digit="1">1</button>
      <button class="pin-btn" type="button" data-pin-digit="2">2</button>
      <button class="pin-btn" type="button" data-pin-digit="3">3</button>
      <button class="pin-btn" type="button" data-pin-digit="4">4</button>
      <button class="pin-btn" type="button" data-pin-digit="5">5</button>
      <button class="pin-btn" type="button" data-pin-digit="6">6</button>
      <button class="pin-btn" type="button" data-pin-digit="7">7</button>
      <button class="pin-btn" type="button" data-pin-digit="8">8</button>
      <button class="pin-btn" type="button" data-pin-digit="9">9</button>
      <button class="pin-btn" type="button" id="pin-backspace" aria-label="Backspace">←</button>
      <button class="pin-btn" type="button" data-pin-digit="0">0</button>
      <button class="pin-btn" type="button" id="pin-submit" aria-label="Submit PIN">✓</button>
    </div>
    <div id="pin-error">Incorrect PIN</div>
  </div>

  <script>
    const lyricsEl = document.getElementById('lyrics-text');
    const lyricsContainer = document.getElementById('lyrics-container');
    const lyricsInner = document.getElementById('lyrics-inner');
    const btnLyrics = document.getElementById('btn-lyrics');
    const btnVote = document.getElementById('btn-vote');
    const btnDark = document.getElementById('btn-dark');
    const loginBanner = document.getElementById('login-banner');
    const timeoutToast = document.getElementById('timeout-toast');
    const lyricsSource = document.getElementById('lyrics-source');
    const pageIndicator = document.getElementById('page-indicator');
    const tapFlash = document.getElementById('tap-flash');
    const btnDebug = document.getElementById('btn-debug');
    const debugOverlay = document.getElementById('debug-overlay');
    const debugLog = document.getElementById('debug-log');
     const voteTally = document.getElementById('vote-tally');
     const voteKeepSide = document.getElementById('vote-keep-side');
     const voteSkipSide = document.getElementById('vote-skip-side');
     const voteToastStack = document.getElementById('vote-toast-stack');
    const btnDebugClose = document.getElementById('btn-debug-close');
    const btnDebugClear = document.getElementById('btn-debug-clear');
    const loaderOverlay = document.getElementById('loader-overlay');
    const loaderTitle = document.getElementById('loader-title');
    const loaderArtist = document.getElementById('loader-artist');
    const loaderBarFill = document.getElementById('loader-bar-fill');
    const loaderStage = document.getElementById('loader-stage');
    const pinOverlay = document.getElementById('pin-overlay');
    const pinDisplay = document.getElementById('pin-display');
    const pinDots = document.getElementById('pin-dots');
    const pinError = document.getElementById('pin-error');
    const pinBackspace = document.getElementById('pin-backspace');
    const pinSubmit = document.getElementById('pin-submit');
    const pinDigitButtons = Array.from(document.querySelectorAll('[data-pin-digit]'));

    // ── Debug helpers ──────────────────────────────────────────────
    const MAX_DEBUG_LINES = 200;
    let debugLineCount = 0;
    let pinEntry = '';
    let pinErrorTimer = null;
    let pinResetTimer = null;
    let pinSubmitting = false;
    let eventSource = null;
    let sseReconnectTimer = null;
    let appBooted = false;

    function showVoteToast(msg) {
      if (!msg) return;
      const item = document.createElement('div');
      item.className = 'vote-toast-item';
      item.textContent = msg;
      voteToastStack.appendChild(item);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => item.classList.add('visible'));
      });
      setTimeout(() => {
        item.classList.remove('visible');
        item.addEventListener('transitionend', () => item.remove(), { once: true });
      }, 3000);
    }

     function makeTallyEmoji(emoji) {
       const span = document.createElement('span');
       span.className = 'tally-emoji';
       span.textContent = emoji;
       twemoji.parse(span, { folder: 'svg', ext: '.svg' });
       return span;
     }

     function updateVoteTally(skipCount, keepCount, voters) {
       if (!voters || voters.length === 0) {
         voteTally.classList.remove('visible', 'skipping');
         return;
       }
       voteTally.classList.remove('skipping');
       voteKeepSide.innerHTML = '';
       voteSkipSide.innerHTML = '';
       voters.filter((v) => v.vote === 'keep').forEach((v) => voteKeepSide.appendChild(makeTallyEmoji(v.name)));
       voters.filter((v) => v.vote === 'skip').forEach((v) => voteSkipSide.appendChild(makeTallyEmoji(v.name)));
       voteTally.classList.add('visible');
     }

     function showSkipping() {
       voteKeepSide.innerHTML = '';
       voteSkipSide.innerHTML = '';
       voteTally.classList.add('visible', 'skipping');
     }

    function dbg(msg, level = 'ok') {
      debugLineCount++;
      const now = new Date();
      const ts = now.toTimeString().slice(0, 8);
      const line = document.createElement('div');
      line.className = `dbg-line ${level}`;
      line.textContent = `[${ts}] ${msg}`;
      debugLog.appendChild(line);
      // Trim old entries to keep memory bounded
      if (debugLineCount > MAX_DEBUG_LINES) {
        debugLog.removeChild(debugLog.firstChild);
        debugLineCount--;
      }
      // Auto-scroll to bottom if overlay is open
      if (debugOverlay.classList.contains('visible')) {
        debugLog.scrollTop = debugLog.scrollHeight;
      }
    }

    btnDebug.addEventListener('click', () => {
      debugOverlay.classList.add('visible');
      debugLog.scrollTop = debugLog.scrollHeight;
    });
    btnDebugClose.addEventListener('click', () => debugOverlay.classList.remove('visible'));
    btnDebugClear.addEventListener('click', () => {
      debugLog.innerHTML = '';
      debugLineCount = 0;
      dbg('Log cleared.', 'info');
    });

    dbg('App initialised.', 'info');

    let flashTimer = null;

    function triggerFlash(side) {
      tapFlash.classList.remove('left', 'right', 'flash');
      void tapFlash.offsetWidth;
      tapFlash.classList.add(side, 'flash');
      clearTimeout(flashTimer);
      flashTimer = setTimeout(() => {
        tapFlash.style.transition = 'opacity 0.45s ease-out';
        tapFlash.classList.remove('flash');
        flashTimer = setTimeout(() => {
          tapFlash.style.transition = 'opacity 0.05s ease-in';
        }, 480);
      }, 188);
    }

    const LINES_PER_PAGE = 29;
    const TWO_COL_THRESHOLD = 20;

    let pages = [];
    let currentPage = 0;
    let songUseTwoColumns = false;
    let currentMeta = { source: null, artist: null, title: null, usedAiExtraction: false };

    function applyDarkMode(dark) {
      document.body.classList.toggle('dark', dark);
      localStorage.setItem('darkMode', dark ? '1' : '0');
    }

    applyDarkMode(localStorage.getItem('darkMode') === '1');
    btnDark.addEventListener('click', () => applyDarkMode(!document.body.classList.contains('dark')));

    function updatePinDots() {
      pinDots.textContent = '●'.repeat(pinEntry.length);
    }

    function clearPinError() {
      pinError.classList.remove('visible');
      pinDisplay.classList.remove('shake');
      clearTimeout(pinErrorTimer);
      pinErrorTimer = null;
    }

    function setPinLocked(locked) {
      document.body.classList.toggle('pin-locked', locked);
      pinOverlay.classList.toggle('hidden', !locked);
      if (locked) {
        loginBanner.classList.remove('visible');
        hideLoader();
        if (eventSource) {
          eventSource.close();
          eventSource = null;
        }
        clearTimeout(sseReconnectTimer);
        sseReconnectTimer = null;
      } else if (appBooted && !eventSource && !sseReconnectTimer) {
        connectSSE();
      }
    }

    function clearPinEntry() {
      pinEntry = '';
      updatePinDots();
    }

    function showPinErrorState() {
      pinError.classList.add('visible');
      pinDisplay.classList.remove('shake');
      void pinDisplay.offsetWidth;
      pinDisplay.classList.add('shake');
      clearTimeout(pinErrorTimer);
      pinErrorTimer = setTimeout(() => clearPinError(), 600);
    }

    async function submitPin() {
      if (!pinEntry || pinSubmitting) return;

      pinSubmitting = true;
      clearPinError();
      clearTimeout(pinResetTimer);

      try {
        const res = await fetch('/pin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin: pinEntry }),
        });
        const data = await res.json().catch(() => ({}));

        if (res.ok && data.ok) {
          clearPinEntry();
          setPinLocked(false);
          await bootstrapApp();
          return;
        }

        showPinErrorState();
        pinResetTimer = setTimeout(() => {
          clearPinEntry();
          clearPinError();
        }, 600);
      } catch (err) {
        dbg(`PIN error: ${err}`, 'err');
        showPinErrorState();
      } finally {
        pinSubmitting = false;
      }
    }

    function appendPinDigit(digit) {
      if (pinSubmitting || pinEntry.length >= 6) return;
      pinEntry += digit;
      updatePinDots();
      clearPinError();
      if (pinEntry.length === 6) {
        submitPin();
      }
    }

    pinDigitButtons.forEach((button) => {
      button.addEventListener('click', () => appendPinDigit(button.dataset.pinDigit));
    });

    pinBackspace.addEventListener('click', () => {
      if (pinSubmitting || !pinEntry.length) return;
      pinEntry = pinEntry.slice(0, -1);
      updatePinDots();
      clearPinError();
    });

    pinSubmit.addEventListener('click', () => submitPin());

    function buildPages(text) {
      if (!text) return [''];
      const lines = text.split('\n');
      const containerH = lyricsContainer.clientHeight;
      songUseTwoColumns = lines.length >= TWO_COL_THRESHOLD;

      if (!containerH) {
        const result = [];
        for (let i = 0; i < lines.length; i += LINES_PER_PAGE) {
          result.push(lines.slice(i, i + LINES_PER_PAGE).join('\n'));
        }
        return result.length ? result : [''];
      }

      lyricsInner.style.visibility = 'hidden';
      lyricsInner.style.columnCount = songUseTwoColumns ? '2' : 'auto';
      const result = [];
      let i = 0;

      while (i < lines.length) {
        let lo = 1, hi = lines.length - i, fits = 1;
        while (lo <= hi) {
          const mid = Math.floor((lo + hi) / 2);
          lyricsInner.textContent = lines.slice(i, i + mid).join('\n');
          if (lyricsInner.offsetHeight <= containerH) {
            fits = mid;
            lo = mid + 1;
          } else {
            hi = mid - 1;
          }
        }
        result.push(lines.slice(i, i + fits).join('\n'));
        i += fits;
      }

      lyricsInner.style.visibility = '';
      lyricsInner.textContent = '';
      lyricsInner.style.columnCount = 'auto';
      return result.length ? result : [''];
    }

    function renderPage(index) {
      if (!pages.length) return;
      currentPage = Math.max(0, Math.min(index, pages.length - 1));

      lyricsInner.textContent = pages[currentPage];
      lyricsInner.style.columnCount = songUseTwoColumns ? '2' : 'auto';

      if (pages.length > 1) {
        pageIndicator.textContent = `${currentPage + 1}/${pages.length}`;
        pageIndicator.classList.add('visible');
      } else {
        pageIndicator.classList.remove('visible');
      }
    }

    function updateBottomMeta() {
      const { source, artist, title, usedAiExtraction } = currentMeta;
      const parts = [];
      if (artist || title) parts.push([artist, title].filter(Boolean).join(' — '));
      if (source) parts.push(source);
      if (usedAiExtraction) parts.push('AI extracted');
      if (parts.length) {
        lyricsSource.textContent = parts.join(' · ');
        lyricsSource.classList.add('visible');
      } else {
        lyricsSource.classList.remove('visible');
      }
    }

    function showLyrics(text, isMuted, source, artist, title, usedAiExtraction = false) {
      lyricsEl.classList.toggle('muted', !!isMuted);
      currentMeta = { source, artist, title, usedAiExtraction };
      updateBottomMeta();

      pages = buildPages(text);
      currentPage = 0;
      renderPage(0);
    }

    document.addEventListener('click', (e) => {
      if (!pages.length || pages.length <= 1) return;
      const tag = e.target.tagName;
      if (tag === 'BUTTON' || e.target.closest('button')) return;
      if (e.clientX < window.innerWidth / 2) {
        triggerFlash('left');
        renderPage(currentPage - 1);
      } else {
        triggerFlash('right');
        renderPage(currentPage + 1);
      }
    });

     function setModeUI(polling, voting) {
       const wasPolling = btnLyrics.classList.contains('active');
       btnLyrics.classList.toggle('active', polling);
       btnVote.classList.toggle('active', voting);
       if (!voting) {
         voteTally.classList.remove('visible', 'skipping');
       }
       if (wasPolling && !polling) {
         hideLoader();
         showLyrics('', true, null, null, null, false);
       }
     }

    function showTimeout() {
      timeoutToast.classList.add('visible');
      setTimeout(() => timeoutToast.classList.remove('visible'), 5000);
    }

    function showLoader(title, artist) {
      loaderTitle.textContent = title || '';
      loaderArtist.textContent = artist || '';
      loaderBarFill.style.width = '0%';
      loaderStage.textContent = '';
      loaderOverlay.classList.add('visible');
    }

    function updateProgress(stage, pct) {
      const labels = {
        lrclib: 'Checking LRCLIB',
        genius: 'Trying Genius',
        brave: 'Searching web',
        ai: 'AI extraction',
        done: '',
      };

      loaderBarFill.style.width = pct + '%';
      loaderStage.textContent = labels[stage] || '';
    }

    function hideLoader() {
      loaderOverlay.classList.remove('visible');
    }

    function handleEvent(payload) {
      if (payload.status === 'timeout') {
        hideLoader();
        showTimeout();
        return;
      }

      if (payload.status === 'playing' && payload.title) {
        hideLoader();
        showLyrics(payload.lyrics || 'Lyrics not found.', !payload.lyrics, payload.source, payload.artist, payload.title, !!payload.usedAiExtraction);
        return;
      }

      if (payload.status === 'idle') {
        hideLoader();
        showLyrics('Nothing is currently playing.', true, null, null, null, false);
        return;
      }
    }

    function connectSSE() {
      if (eventSource) {
        eventSource.close();
      }
      dbg('SSE: connecting to /events…', 'info');
      const es = new EventSource('/events');
      eventSource = es;

      es.onmessage = (e) => {
        try {
          const payload = JSON.parse(e.data);
          if (payload.type === 'state') {
            setModeUI(payload.isPolling, payload.isVoting);
            return;
          }
          if (payload.type === 'page') {
            const delta = payload.direction === 'next' ? 1 : -1;
            renderPage(currentPage + delta);
            return;
          }
           if (payload.type === 'vote') {
             if (payload.skipping) {
               showSkipping();
             } else {
               updateVoteTally(payload.skipCount, payload.keepCount, payload.voters);
             }
             showVoteToast(payload.toast);
             return;
           }
          if (payload.type === 'log') {
            dbg(payload.msg, payload.level || 'ok');
            return;
          }
          if (payload.type === 'progress') {
            updateProgress(payload.stage, payload.pct);
            return;
          }
          if (payload.type === 'loading') {
            showLoader(payload.title, payload.artist);
            return;
          }
          dbg(`SSE ← ${JSON.stringify(payload)}`, 'ok');
          handleEvent(payload);
        } catch (err) {
          dbg(`SSE parse error: ${err}`, 'err');
        }
      };

      es.onerror = () => {
        if (eventSource !== es) return;
        dbg('SSE: connection error — reconnecting in 3s.', 'err');
        es.close();
        eventSource = null;
        clearTimeout(sseReconnectTimer);
        sseReconnectTimer = setTimeout(connectSSE, 3000);
      };
    }

    async function apiCall(endpoint) {
      dbg(`API → POST ${endpoint}`, 'info');
      try {
        const res = await fetch(endpoint, { method: 'POST' });
        dbg(`API ← ${endpoint} HTTP ${res.status}`, res.ok ? 'ok' : 'warn');
        if (res.status === 401) {
          const data = await res.json().catch(() => ({}));
          if (data.pinRequired) {
            dbg('API: 401 — PIN required.', 'warn');
            setPinLocked(true);
            return;
          }
          dbg('API: 401 — not authenticated, showing login banner.', 'warn');
          loginBanner.classList.add('visible');
        }
      } catch (err) {
        dbg(`API error ${endpoint}: ${err}`, 'err');
      }
    }

    btnLyrics.addEventListener('click', () => apiCall('/api/lyrics'));
    btnVote.addEventListener('click', () => apiCall('/api/vote-mode'));

    async function checkAuth() {
      dbg('AUTH → GET /api/status', 'info');
      try {
        const res = await fetch('/api/status');
        const data = await res.json().catch(() => ({}));

        if (res.status === 401 && data.pinRequired) {
          dbg('AUTH ← PIN required', 'warn');
          setPinLocked(true);
          return { pinRequired: true, authenticated: false, isPolling: false };
        }

        setPinLocked(false);
        dbg(`AUTH ← authenticated=${data.authenticated} isPolling=${data.isPolling} isVoting=${data.isVoting}`, data.authenticated ? 'ok' : 'warn');
        if (!data.authenticated) {
          loginBanner.classList.add('visible');
        } else {
          loginBanner.classList.remove('visible');
        }
        setModeUI(data.isPolling, !!data.isVoting);
        return data;
      } catch (err) {
        dbg(`AUTH error: ${err}`, 'err');
        return null;
      }
    }

    async function bootstrapApp() {
      const authState = await checkAuth();
      if (!authState || authState.pinRequired) {
        return;
      }

      if (!appBooted) {
        connectSSE();
        appBooted = true;
      }
    }

    async function acquireWakeLock() {
      if (!('wakeLock' in navigator)) {
        dbg('Wake lock: not supported in this browser.', 'warn');
        return;
      }
      try {
        await navigator.wakeLock.request('screen');
        dbg('Wake lock: acquired.', 'ok');
      } catch (err) {
        dbg(`Wake lock error: ${err}`, 'err');
      }
    }

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') acquireWakeLock();
    });

    updatePinDots();
    bootstrapApp();
    acquireWakeLock();
  </script>
</body>
</html>
